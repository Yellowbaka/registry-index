description: >-
  The unofficial expansion mod for Cataclysm: Bright Nights.


  The gigantic jabberwock of a mod that adds a lot of content to the game: new
  items, buildings, scenarios, monsters, etc. It also reworks and adds
  alternatives to many things from recipes to scenarios. It also adds a
  pseudo-story and lore on the works.


  The Bio-Weapon, Super Soldier, Commandeers, Slave Fighters and the Old World
  Prepper NPC factions join the world.


  Seek the Bio-weapons, find loot, take down new monsters and invest in skills
  for new craftable items.
