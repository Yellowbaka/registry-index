display_name: Yellow Tweaks
short_description: >-
  Quick and dirty mod to revert changes made by dedmemdev. Specifically readds
  SWAT Zombies and gets rid of the enemies in the dead squad of soldiers special
description: >-
  Reverts a couple of changes I don't like. Re-adds the SWAT Zombie and makes
  the cop zombie have the riot gear again. Swat Truck specials still exist but
  have normal SWAT zombies in them. The dead soldier special acts as it did
  prior to being changed. This makes it much more similar to old Cataclysm which
  is what I like personally
