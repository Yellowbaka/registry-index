name: Autoupdate

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mod_id:
        description: "Optional mod id to update; empty updates all mods"
        required: false
        type: string

permissions:
  contents: write

jobs:
  autoupdate:
    name: Check for Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry-index
        uses: actions/checkout@v4
        with:
          path: registry-index

      - name: Checkout registry tools
        uses: actions/checkout@v4
        with:
          repository: cataclysmbn/registry
          path: registry

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run autoupdate
        working-directory: registry
        run: |
          target="../registry-index/manifests"
          if [ -n "$MOD_ID" ]; then
            case "$MOD_ID" in
              *[!A-Za-z0-9_-]*)
                echo "::error::mod_id can only contain letters, numbers, underscores, and hyphens"
                exit 1
                ;;
            esac
            target="$target/$MOD_ID.yaml"
          fi
          deno run -RW --allow-net --allow-env --allow-run=gh src/scripts/autoupdate.ts "$target"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOD_ID: ${{ github.event.inputs.mod_id }}

      - name: Regenerate index files
        working-directory: registry
        run: deno run -RW --allow-run=git src/scripts/generate.ts ../registry-index/manifests ../registry-index/generated

      - name: Format registry-index files
        run: deno fmt registry-index

      - name: Check for changes
        id: check
        working-directory: registry-index
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit registry-index updates
        if: steps.check.outputs.changed == 'true'
        working-directory: registry-index
        run: |
          git add -A
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: autoupdate mod versions"
          git push
