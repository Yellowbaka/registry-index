name: Autoupdate

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autoupdate:
    name: Check for Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: registry-index

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Clone registry repo for tooling
        run: git clone --depth 1 https://github.com/cataclysmbnteam/registry.git registry

      - name: Run tag-only autoupdate
        run: deno run -RW --allow-net --allow-env --allow-run=gh registry/src/scripts/autoupdate.ts registry-index/manifests --tag-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate index files
        run: |
          cd registry
          deno task generate ../registry-index

      - name: Format registry-index files
        run: |
          cd registry
          deno fmt ../registry-index

      - name: Check for changes
        id: check
        run: |
          cd registry-index
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          cd registry-index
          git add -A
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: autoupdate mod versions"
          git push origin HEAD:main
